{% set name = "omero-rois" %}
{% set version = "0.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 6c672518f031e81f12ae4f482da47d9aacad7d3f7e868d9f91794cfa3d841369

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - pytest
    - python >=3.6
  run:
    - omero-py >=5.6.0
    - python >=3.6

test:
  imports:
    - omero_rois
  commands:
    - pip list
    - pip check
  requires:
    - pip

about:
  home: https://github.com/ome/omero-rois/
  summary: OMERO Python utilities for handling regions of interest.
  license: GPL-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - goanpeca
